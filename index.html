<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BD calc</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&family=Prompt:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a29bfe; --bg: #f0f2f5; --text: #2d3436; --accent: #ff7675; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 30px; }
        .header { background: var(--primary); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        label { font-size: 0.85rem; color: #636e72; font-weight: 600; display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #edf2f7; border-radius: 10px; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; background: #fafafa; outline: none; }
        .calc-table { width: 100%; border-collapse: collapse; }
        .calc-table td { padding: 12px 5px; border-bottom: 1px solid #eee; }
        .calc-table td:last-child { text-align: right; color: #6c5ce7; font-weight: 600; font-family: 'Prompt'; }
        .water-box { background: #fff0f3; color: #e84393; padding: 15px; border-radius: 15px; text-align: center; font-weight: 600; margin-top: 15px; border: 1px dashed #ff7675; }
        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(255,118,117,0.3); }
        .total-box { background: #2d3436; color: white; padding: 20px; border-radius: 20px; display: flex; justify-content: space-around; text-align: center; margin-top: 10px; }
        .total-box b { font-size: 1.5rem; display: block; font-family: 'Prompt'; color: #a29bfe; }
        .method-select { background: #fff9db; border: 1.5px solid #ffe066; font-weight: 600; color: #f08c00; }
        .log-table { width: 100%; font-size: 0.9rem; border-collapse: collapse; margin-top: 10px; }
        .log-table th { text-align: left; padding: 8px; border-bottom: 2px solid #eee; }
        .log-table td { padding: 10px 8px; border-bottom: 1px solid #f9f9f9; }
        .btn-del { color: #ff7675; cursor: pointer; font-size: 1.1rem; border: none; background: none; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size:1.2rem; font-family:'Prompt'">BD calc.</h1>
    <button id="syncBtn" onclick="syncData()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:8px 12px; border-radius:10px; cursor:pointer;">🔄 อัปเดตสูตร</button>
</div>

<div class="container">
    <div class="card">
        <label>เลือกสูตรอาหาร</label>
        <select id="sheetSelect" onchange="loadMethod()"></select>
        
        <label>วิธีเพิ่มพลังงาน (ตรวจสอบจากช่อง B4)</label>
        <select id="userMethod" class="method-select" onchange="calculate()">
            <option value="เพิ่มวัตถุดิบ">เพิ่มวัตถุดิบ (คูณ Conc. เข้าวัตถุดิบ)</option>
            <option value="เติมอาหารทางการแพทย์">เติมอาหารทางการแพทย์ (วัตถุดิบคงเดิม)</option>
        </select>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 2;"><label>ปริมาตร (ml)</label><input type="number" id="vol" value="1000" oninput="calculate()"></div>
            <div style="flex: 1;"><label>Conc.</label>
                <select id="conc" onchange="calculate()">
                    <option value="1.0">1.0</option><option value="1.2" selected>1.2</option><option value="1.5">1.5</option><option value="2.0">2.0</option>
                </select>
            </div>
        </div>

        <label>ยี่ห้ออาหารทางการแพทย์</label>
        <select id="brand" onchange="calculate()">
            <option value="Gen-DM">Gen-DM</option><option value="Blendera">Blendera</option>
        </select>
    </div>

    <div class="card">
        <table class="calc-table"><tbody id="tbody"></tbody></table>
        <div id="waterInfo" class="water-box">กรุณากดปุ่มอัปเดตสูตร...</div>
        <button class="btn-main" onclick="addRecord()">✨ บันทึกมื้อนี้</button>
    </div>

    <div class="total-box">
        <div><small>Vol รวมวันนี้</small><b id="tVol">0</b></div>
        <div><small>Kcal รวมวันนี้</small><b id="tKcal">0</b></div>
    </div>

    <div class="card" id="logSection" style="display:none; margin-top:15px;">
        <label>ประวัติการบันทึกวันนี้</label>
        <table class="log-table">
            <thead><tr><th>เวลา</th><th>Vol</th><th>Kcal</th><th>ลบ</th></tr></thead>
            <tbody id="logBody"></tbody>
        </table>
        <center><button onclick="clearLogs()" style="margin-top:20px; border:none; background:#eee; color:#666; padding:8px 20px; border-radius:50px; cursor:pointer;">🗑️ ล้างข้อมูลทั้งหมด</button></center>
    </div>
</div>

<script>
    // URL ของคุณที่เช็คแล้วว่าถูกต้อง
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWeMeP_SFHgV_MWXxDhK-XlCBKCu28MAOIRAZx1_Q_jsSDcipTPzjF-K_s2azxtx5H/exec";
    
    // ใช้ชื่อกลางเพื่อเรียกข้อมูลกลับมา
    let db = JSON.parse(localStorage.getItem('bd_final_db')) || {};
    let logs = JSON.parse(localStorage.getItem('bd_final_logs')) || [];

    window.onload = () => { 
        renderMenu(); 
        renderLogs(); 
        if(!Object.keys(db).length) {
            document.getElementById('waterInfo').innerText = "ยังไม่มีข้อมูลสูตร กรุณากดอัปเดต";
        }
    };

    async function syncData() {
        const btn = document.getElementById('syncBtn');
        btn.innerText = "⏳ กำลังโหลด...";
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getSheets`, { method: 'GET', redirect: 'follow' });
            if (!res.ok) throw new Error();
            const names = await res.json();
            
            let newDb = {};
            for (let n of names) {
                const d = await fetch(`${SCRIPT_URL}?action=getIngredients&name=${encodeURIComponent(n)}`, { method: 'GET', redirect: 'follow' });
                newDb[n] = await d.json();
            }
            
            db = newDb;
            localStorage.setItem('bd_final_db', JSON.stringify(db));
            renderMenu();
            alert("✅ อัปเดตสูตรอาหารทั้งหมดเรียบร้อย!");
        } catch(e) {
            alert("❌ เชื่อมต่อผิดพลาด: โปรดเช็คว่าใน Google Script ตั้งค่าเป็น 'Anyone' (ทุกคน) หรือยัง?");
        }
        btn.innerText = "🔄 อัปเดตสูตร";
    }

    function renderMenu() {
        const s = document.getElementById('sheetSelect');
        s.innerHTML = '<option disabled selected>--- เลือกสูตร ---</option>';
        Object.keys(db).forEach(n => s.add(new Option(n, n)));
    }

    function loadMethod() {
        const name = document.getElementById('sheetSelect').value;
        if(db[name]) {
            const methodInSheet = db[name].method.toString().trim();
            // ตรวจสอบจากคำ
