<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BD calc</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&family=Prompt:wght@600&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3221/3221626.png">
    <style>
        :root { --primary: #74b9ff; --bg: #f8faff; --text: #2d3436; --accent: #ff7675; --card-bg: #ffffff; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 30px; }
        
        /* Header แบบ Gradient นุ่มๆ */
        .header { background: linear-gradient(135deg, #a29bfe, #74b9ff); padding: 18px 15px; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 12px rgba(116, 185, 255, 0.2); }
        .header h1 { margin: 0; font-size: 1.3rem; font-family: 'Prompt'; display: flex; align-items: center; gap: 8px; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        /* Card แบบโค้งมนดูสมัยใหม่ */
        .card { background: var(--card-bg); border-radius: 24px; padding: 22px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.8); }
        
        label { font-size: 0.85rem; color: #b2bec3; font-weight: 600; display: block; margin-bottom: 8px; margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        select, input { width: 100%; padding: 14px; border: 2px solid #f1f2f6; border-radius: 16px; margin-bottom: 12px; font-size: 16px; box-sizing: border-box; background: #f9f9fb; outline: none; transition: all 0.2s; color: var(--text); }
        select:focus, input:focus { border-color: #a29bfe; background: #fff; box-shadow: 0 0 0 4px rgba(162, 155, 254, 0.1); }
        
        /* ตารางคำนวณ */
        .calc-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .calc-table td { padding: 14px 8px; border-bottom: 1px solid #f1f2f6; font-size: 0.95rem; }
        .calc-table tr:last-child td { border-bottom: none; }
        .calc-table td:last-child { text-align: right; color: #6c5ce7; font-weight: 600; font-family: 'Prompt'; }
        
        .water-box { background: #eef2ff; color: #4361ee; padding: 16px; border-radius: 18px; text-align: center; font-weight: 600; margin-top: 5px; font-size: 0.9rem; }
        
        /* ปุ่มกด */
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; border: none; border-radius: 18px; font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 15px; box-shadow: 0 6px 15px rgba(108, 92, 231, 0.25); transition: 0.3s; }
        .btn-main:active { transform: scale(0.97); }
        
        /* กล่องสรุปยอด */
        .total-box { background: #2d3436; color: white; padding: 22px; border-radius: 24px; display: flex; justify-content: space-around; text-align: center; margin-top: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .total-box small { color: #b2bec3; font-size: 0.75rem; display: block; margin-bottom: 5px; }
        .total-box b { font-size: 1.4rem; font-family: 'Prompt'; color: #74b9ff; }
